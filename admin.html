<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubayGames - Live Admin Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0b111e] text-white font-sans overflow-x-hidden">

  <header class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <span class="text-2xl font-black tracking-wider text-cyan-400 uppercase">Zubay<span class="text-white">Admin Hub</span></span>
      <a href="robux.html" class="text-xs font-bold text-gray-400 hover:text-white transition uppercase border border-gray-800 bg-[#131b2e] px-4 py-2 rounded-xl">View Robux Page →</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-10 space-y-8">
    
    <!-- PRODUCT STOCK MANAGEMENT PANEL -->
    <section class="bg-[#0f172a] border border-gray-800 rounded-2xl p-6 space-y-4">
      <h3 class="text-lg font-black tracking-wide text-cyan-400 uppercase">📦 Live Product Stock Manager</h3>
      <div id="stock-cards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <!-- Javascript will inject 6 stock modules automatically -->
      </div>
    </section>

    <!-- LIVE ORDERS REAL-TIME LEDGER -->
    <section class="bg-[#0f172a] border border-gray-800 rounded-2xl p-6 space-y-4">
      <h3 class="text-lg font-black tracking-wide text-gray-200">📊 Intercepted Orders Log Ledger</h3>
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse text-xs">
          <thead>
            <tr class="border-b border-gray-800 text-gray-400 uppercase tracking-wider font-bold">
              <th class="py-3 px-2">Order ID</th>
              <th class="py-3 px-2">Customer</th>
              <th class="py-3 px-2">Product Profile</th>
              <th class="py-3 px-2 text-right">Settlement</th>
            </tr>
          </thead>
          <tbody id="admin-orders-table" class="divide-y divide-gray-800/40 text-gray-300">
            <tr><td colspan="4" class="py-6 text-center text-gray-500">Fetching order pipeline matrix...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    const productKeys = ["80_robux", "400_robux", "800_robux", "1700_robux", "4500_robux", "10000_robux"];

    function buildStockCards() {
      const container = document.getElementById('stock-cards-container');
      container.innerHTML = '';
      productKeys.forEach(key => {
        const titleName = key.replace('_', ' ').toUpperCase();
        container.innerHTML += `
          <div class="bg-[#131b2e] border border-gray-800 p-4 rounded-xl flex flex-col justify-between space-y-3">
            <div>
              <h4 class="font-bold text-sm text-gray-200">${titleName}</h4>
              <p class="text-xs text-gray-500 mt-1">Status: <span id="status-${key}" class="font-bold text-yellow-500">Loading...</span></p>
            </div>
            <div class="flex gap-2">
              <button onclick="toggleStock('${key}', 'In Stock')" class="flex-1 bg-green-600/20 text-green-400 border border-green-500/30 text-[10px] py-1.5 font-bold rounded uppercase cursor-pointer hover:bg-green-600/40 transition">In Stock</button>
              <button onclick="toggleStock('${key}', 'Out of Stock')" class="flex-1 bg-red-600/20 text-red-400 border border-red-500/30 text-[10px] py-1.5 font-bold rounded uppercase cursor-pointer hover:bg-red-600/40 transition">Stock Out</button>
            </div>
          </div>
        `;
      });
    }

    async function loadDashboardData() {
      try {
        const response = await fetch('/api/submit-order');
        const data = await response.json();

        if (data.success) {
          productKeys.forEach(key => {
            const el = document.getElementById(`status-${key}`);
            if (el && data.stock[key]) {
              el.innerText = data.stock[key];
              el.className = data.stock[key] === "In Stock" ? "font-bold text-green-400" : "font-bold text-red-400";
            }
          });

          const tableBody = document.getElementById('admin-orders-table');
          if (data.orders && data.orders.length > 0) {
            tableBody.innerHTML = '';
            data.orders.forEach(order => {
              tableBody.innerHTML += `
                <tr class="hover:bg-gray-800/20 transition">
                  <td class="py-3 px-2 text-gray-500 font-mono">${order.id}</td>
                  <td class="py-3 px-2 font-bold text-white">${order.user} <br><span class="text-[10px] text-gray-500 font-normal font-mono">${order.email}</span></td>
                  <td class="py-3 px-2 text-gray-300 font-medium">${order.product}</td>
                  <td class="py-3 px-2 text-right font-black text-cyan-400">৳${order.price}</td>
                </tr>
              `;
            });
          } else {
            tableBody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-gray-500 italic">No incoming orders captured yet.</td></tr>`;
          }
        }
      } catch (err) {
        console.error("Dashboard synchronization error");
      }
    }

    async function toggleStock(prodId, status) {
      try {
        await fetch('/api/submit-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ type: 'update_stock', prodId, status })
        });
        loadDashboardData();
      } catch (err) {
        alert("Stock modification failed.");
      }
    }

    window.onload = function() {
      buildStockCards();
      loadDashboardData();
      setInterval(loadDashboardData, 4000);
    };
  </script>
</body>
</html>
