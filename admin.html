<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buy Robux - ZubayGames</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#0b111e] text-white font-sans min-h-screen">

  <header class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <a href="index.html" class="text-2xl font-black tracking-wider text-cyan-400 uppercase">Zubay<span class="text-white">Games</span></a>
      <a href="index.html" class="text-sm font-medium text-gray-400 hover:text-cyan-400 transition">← Store-এ ফিরে যান</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
      
      <div class="lg:col-span-5 space-y-6">
        <div class="w-full h-64 bg-cover bg-center rounded-2xl border border-gray-800" style="background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTKYhzyCKitqcDZi2kGZue8Wbyv-M8LHPohWk_qsgl-m0Ak5pKr3S2DVHh4&s=10');"></div>
        <div class="bg-[#0f172a] border border-gray-800 rounded-xl p-5">
          <h3 class="text-xs font-black text-cyan-400 uppercase mb-3">⚡ জরুরি তথ্য</h3>
          <p class="text-xs text-gray-400">● আমরা আপনার আইডিতে লগইন করে Robux যোগ করবো।<br>● অর্ডার সম্পন্ন হওয়ার সাথে সাথে আপনার ডাটা মুছে ফেলা হবে।</p>
        </div>
      </div>

      <div class="lg:col-span-7 space-y-8">
        <div class="space-y-4">
          <h2 class="text-base font-black text-cyan-400 uppercase">১. প্যাকেজ সিলেক্ট করুন</h2>
          <div id="dynamic-package-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
            <!-- Dynamic server button components hook up here inside loader loop execution -->
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <input type="text" id="roblox-id" placeholder="Roblox Username" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-200">
            <input type="password" id="roblox-pass" placeholder="Password" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-200">
            <input type="text" id="backup-codes" placeholder="Backup Codes" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-200">
            <input type="text" id="contact-number" placeholder="WhatsApp Number" class="w-full bg-[#131b2e] border border-gray-700 rounded-xl px-4 py-3 text-sm text-gray-200">
        </div>
        
        <button id="buy-confirm-btn" onclick="handleBuyNow()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-black py-4 rounded-xl text-sm transition">
          অর্ডার কনফার্ম করুন 🚀
        </button>
      </div>
    </div>
  </main>

  <script>
    let selectedPackTitle = "";
    let selectedPackPrice = "";
    let selectedPackKey = "";
    let masterCatalog = {};

    function selectProductCard(element, title, price, key) {
        selectedPackTitle = title;
        selectedPackPrice = price;
        selectedPackKey = key;
        
        document.querySelectorAll('.pack-btn').forEach(b => {
            b.classList.remove('border-cyan-500');
            b.classList.add('border-gray-800');
        });
        element.classList.add('border-cyan-500');
        element.classList.remove('border-gray-800');
    }

    function handleBuyNow() {
        if(!selectedPackKey) return alert("Pehle upar se ek package select karein!");
        localStorage.setItem('checkout_roblox_id', document.getElementById('roblox-id').value);
        localStorage.setItem('checkout_password', document.getElementById('roblox-pass').value);
        localStorage.setItem('checkout_backup_codes', document.getElementById('backup-codes').value);
        localStorage.setItem('checkout_contact_number', document.getElementById('contact-number').value);
        localStorage.setItem('checkout_pack_title', selectedPackTitle);
        localStorage.setItem('checkout_pack_price', selectedPackPrice);
        window.location.href = "bill.html";
    }

    async function syncMarketCatalog() {
      try {
        const response = await fetch('/api/submit-order');
        const data = await response.json();

        if(data.success && data.catalog) {
          masterCatalog = data.catalog;
          const grid = document.getElementById('dynamic-package-grid');
          
          // Re-rendering active cards while locking states seamlessly
          grid.innerHTML = '';
          
          Object.keys(masterCatalog).forEach(key => {
            const item = masterCatalog[key];
            const isOutOfStock = item.status === "Out of Stock";
            const borderStyle = (selectedPackKey === key) ? "border-cyan-500" : "border-gray-800";
            const opacityMode = isOutOfStock ? "opacity-40 cursor-not-allowed" : "cursor-pointer opacity-100";
            const outputPriceDisplay = isOutOfStock ? "Stock Out ❌" : `${item.price} ৳`;
            const disableProp = isOutOfStock ? "disabled" : "";

            grid.innerHTML += `
              <button ${disableProp} onclick="selectProductCard(this, '${item.name}', '${item.price}', '${key}')" class="pack-btn bg-[#0f172a] border ${borderStyle} p-4 rounded-xl transition ${opacityMode}">
                <div class="text-xs font-black">${item.name}</div>
                <div class="text-[11px] font-bold text-gray-400">${outputPriceDisplay}</div>
              </button>
            `;
          });
        }
      } catch (err) { console.error("Catalog stream broken."); }
    }

    window.addEventListener('load', syncMarketCatalog);
    setInterval(syncMarketCatalog, 5000);
  </script>
</body>
</html>
