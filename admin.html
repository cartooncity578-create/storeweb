<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubayGames - Admin Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #admin-secure-content { display: none; }
  </style>
</head>
<body class="bg-[#0b111e] text-white font-sans overflow-x-hidden">

  <!-- PASSWORD GATE -->
  <div id="password-gate" class="fixed inset-0 bg-[#0b111e] z-[100] flex items-center justify-center p-4">
    <div class="bg-[#0f172a] border border-gray-800 p-8 rounded-2xl max-w-sm w-full space-y-4 text-center shadow-2xl">
      <h2 class="text-xl font-black text-cyan-400 uppercase tracking-wider">🔒 Secure Admin Access</h2>
      <input type="password" id="gate-pass" placeholder="Enter Password..." class="w-full bg-[#131b2e] border border-gray-800 rounded-xl px-4 py-3 text-center text-sm font-bold focus:outline-none focus:border-cyan-500">
      <button onclick="verifyAdminGate()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-gray-900 font-black text-xs py-3 rounded-xl uppercase tracking-wider transition">Unlock Dashboard</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div id="admin-secure-content">
    <header class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <span class="text-2xl font-black text-cyan-400 uppercase">Zubay<span class="text-white">Admin</span></span>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10 space-y-8">
      <!-- CREATE PACK -->
      <section class="bg-[#0f172a] border border-gray-800 rounded-2xl p-6 space-y-4">
        <h3 class="text-base font-black text-purple-400 uppercase">➕ Create Custom Robux Pack</h3>
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
          <input type="text" id="new-pack-name" placeholder="Pack Name" class="bg-[#131b2e] border border-gray-800 rounded-xl px-4 py-2.5 text-xs font-bold">
          <input type="number" id="new-pack-price" placeholder="Price (BDT)" class="bg-[#131b2e] border border-gray-800 rounded-xl px-4 py-2.5 text-xs font-bold">
          <button onclick="createNewPackage()" class="bg-purple-600 hover:bg-purple-700 py-2.5 rounded-xl text-xs font-bold uppercase transition">Add Product</button>
        </div>
      </section>
      
      <!-- CATALOG -->
      <section class="bg-[#0f172a] border border-gray-800 rounded-2xl p-6 space-y-4">
        <h3 class="text-lg font-black text-cyan-400 uppercase">📦 Live Product Catalog</h3>
        <div id="stock-cards-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </section>

      <!-- ORDERS TABLE -->
      <section class="bg-[#0f172a] border border-gray-800 rounded-2xl p-6 space-y-4">
        <h3 class="text-lg font-black text-gray-200">📊 Intercepted Orders Ledger</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-xs">
            <thead>
              <tr class="text-gray-400 border-b border-gray-800">
                <th class="py-3 px-2">Order ID</th><th class="py-3 px-2">Customer</th><th class="py-3 px-2">Product</th><th class="py-3 px-2">Price</th>
              </tr>
            </thead>
            <tbody id="admin-orders-table" class="divide-y divide-gray-800"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    function verifyAdminGate() {
      if (document.getElementById('gate-pass').value === "ZubayOwner1234") {
        sessionStorage.setItem('zubay_auth', 'granted');
        document.getElementById('password-gate').style.display = 'none';
        document.getElementById('admin-secure-content').style.display = 'block';
        loadDashboardData();
      } else { alert("Access Denied!"); }
    }

    async function loadDashboardData() {
      // Backend integration logic
      try {
        const res = await fetch('/api/submit-order');
        const data = await res.json();
        // UI rendering logic
      } catch (e) { console.log("Loading dashboard..."); }
    }

    window.onload = () => {
      if (sessionStorage.getItem('zubay_auth') === 'granted') {
        document.getElementById('password-gate').style.display = 'none';
        document.getElementById('admin-secure-content').style.display = 'block';
        loadDashboardData();
      }
    };
  </script>
</body>
</html>
