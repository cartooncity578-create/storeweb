<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZubayGames Admin Panel</title>
<style>
  :root {
    --primary: #7c3aed;
    --bg: #0f0f1a;
    --card: #1a1a2e;
    --text: #ffffff;
    --border: #2e2e45;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .center-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--card);
    padding: 40px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .login-box h1 { font-size: 20px; margin-bottom: 20px; }
  input, textarea, select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #12121f;
    color: var(--text);
    margin-bottom: 12px;
    font-size: 14px;
  }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    font-size: 14px;
  }
  .btn-primary { background: var(--primary); color: white; width: 100%; }
  .btn-secondary { background: #2e2e45; color: white; }
  .btn-danger { background: #e63946; color: white; }
  .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; min-height: 16px; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; margin: 0; }
  main { max-width: 900px; margin: 0 auto; padding: 24px; }
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .section h2 { margin-top: 0; font-size: 16px; }
  .product-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .product-card .row { display: flex; gap: 10px; }
  .product-card .row > * { flex: 1; }
  .price-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .price-row input { margin-bottom: 0; }
  .price-row button { flex-shrink: 0; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .color-row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
  .color-row label { width: 140px; font-size: 13px; }
  .color-row input[type=color] { width: 60px; padding: 2px; margin-bottom: 0; }
  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 16px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status { font-size: 13px; color: #9be29b; }
  label.small { font-size: 12px; opacity: 0.8; display: block; margin-bottom: 4px; }
</style>
</head>
<body>

<div id="login-screen" class="center-screen">
  <div class="login-box">
    <h1>🔐 ZubayGames Admin</h1>
    <input type="password" id="password-input" placeholder="Enter admin password" />
    <button class="btn-primary" onclick="tryLogin()">Login</button>
    <div class="error" id="login-error"></div>
  </div>
</div>

<div id="panel-screen" style="display:none;">
  <header>
    <h1>🎮 ZubayGames Admin Panel</h1>
    <button class="btn-secondary" onclick="logout()">Logout</button>
  </header>

  <main>
    <div class="section">
      <h2>🎨 Theme</h2>
      <div class="color-row"><label>Primary Color</label><input type="color" id="theme-primary"></div>
      <div class="color-row"><label>Background Color</label><input type="color" id="theme-bg"></div>
      <div class="color-row"><label>Card Color</label><input type="color" id="theme-card"></div>
      <div class="color-row"><label>Text Color</label><input type="color" id="theme-text"></div>
    </div>

    <div class="section">
      <h2>💳 Payment Settings</h2>
      <label class="small">Payment Methods (comma separated)</label>
      <input type="text" id="payment-methods" placeholder="bKash, Nagad, Card">
      <label class="small">Payment Instructions / Note</label>
      <textarea id="payment-note" rows="3" placeholder="Payment ke baad screenshot bhejo..."></textarea>
    </div>

    <div class="section">
      <h2>🛒 Products</h2>
      <div id="products-list"></div>
      <button class="btn-secondary" onclick="addProduct()">+ Add Product</button>
    </div>

    <div class="save-bar">
      <span class="status" id="save-status"></span>
      <button class="btn-primary" style="width:auto;" onclick="saveAll()">💾 Save Changes</button>
    </div>
  </main>
</div>

<script>
let ADMIN_PASSWORD = "";
let state = { settings: { theme: {}, payment: { methods: [] } }, products: [] };

async function tryLogin() {
  const pw = document.getElementById("password-input").value;
  const errEl = document.getElementById("login-error");
  errEl.textContent = "Checking...";
  try {
    const res = await fetch("/api/check-password", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw })
    });
    const json = await res.json();
    if (json.ok) {
      ADMIN_PASSWORD = pw;
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("panel-screen").style.display = "block";
      loadData();
    } else {
      errEl.textContent = "Galat password!";
    }
  } catch (e) {
    errEl.textContent = "Server error, check console.";
    console.error(e);
  }
}

function logout() {
  ADMIN_PASSWORD = "";
  document.getElementById("panel-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

async function loadData() {
  try {
    const res = await fetch("/data.json?_=" + Date.now());
    state = await res.json();
  } catch (e) {
    console.error("Could not load data.json, starting empty.", e);
  }
  renderTheme();
  renderPayment();
  renderProducts();
}

function renderTheme() {
  const t = state.settings.theme || {};
  document.getElementById("theme-primary").value = t.primaryColor || "#7c3aed";
  document.getElementById("theme-bg").value = t.backgroundColor || "#0f0f1a";
  document.getElementById("theme-card").value = t.cardColor || "#1a1a2e";
  document.getElementById("theme-text").value = t.textColor || "#ffffff";
}

function renderPayment() {
  const p = state.settings.payment || {};
  document.getElementById("payment-methods").value = (p.methods || []).join(", ");
  document.getElementById("payment-note").value = p.note || "";
}

function renderProducts() {
  const list = document.getElementById("products-list");
  list.innerHTML = "";
  state.products.forEach((prod, idx) => {
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <div class="row">
        <div>
          <label class="small">Product Name</label>
          <input type="text" value="${escapeHtml(prod.name)}" onchange="updateProduct(${idx}, 'name', this.value)">
        </div>
        <div>
          <label class="small">Image URL</label>
          <input type="text" value="${escapeHtml(prod.image || '')}" onchange="updateProduct(${idx}, 'image', this.value)">
        </div>
      </div>
      <label class="small">Description</label>
      <textarea rows="2" onchange="updateProduct(${idx}, 'description', this.value)">${escapeHtml(prod.description || '')}</textarea>
      <label class="small">Prices</label>
      <div id="prices-${idx}"></div>
      <button class="btn-secondary" onclick="addPrice(${idx})">+ Add Price Option</button>
      <div style="margin-top:10px;">
        <button class="btn-danger" onclick="removeProduct(${idx})">🗑 Delete Product</button>
      </div>
    `;
    list.appendChild(card);
    renderPrices(idx);
  });
}

function renderPrices(idx) {
  const el = document.getElementById(`prices-${idx}`);
  el.innerHTML = "";
  (state.products[idx].prices || []).forEach((price, pIdx) => {
    const row = document.createElement("div");
    row.className = "price-row";
    row.innerHTML = `
      <input type="text" placeholder="Label (e.g. 100 Robux)" value="${escapeHtml(price.label)}" onchange="updatePrice(${idx}, ${pIdx}, 'label', this.value)">
      <input type="number" placeholder="Amount" value="${price.amount}" onchange="updatePrice(${idx}, ${pIdx}, 'amount', this.value)">
      <button class="btn-danger" onclick="removePrice(${idx}, ${pIdx})">✕</button>
    `;
    el.appendChild(row);
  });
}

function updateProduct(idx, field, value) { state.products[idx][field] = value; }
function updatePrice(idx, pIdx, field, value) {
  state.products[idx].prices[pIdx][field] = field === "amount" ? Number(value) : value;
}
function addPrice(idx) {
  if (!state.products[idx].prices) state.products[idx].prices = [];
  state.products[idx].prices.push({ label: "", amount: 0 });
  renderPrices(idx);
}
function removePrice(idx, pIdx) {
  state.products[idx].prices.splice(pIdx, 1);
  renderPrices(idx);
}
function addProduct() {
  state.products.push({
    id: Date.now().toString(),
    name: "New Product",
    image: "",
    description: "",
    prices: [{ label: "Default", amount: 0 }]
  });
  renderProducts();
}
function removeProduct(idx) {
  if (confirm("Yeh product delete karna hai?")) {
    state.products.splice(idx, 1);
    renderProducts();
  }
}

function escapeHtml(str) {
  return String(str || "").replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[m]));
}

async function saveAll() {
  state.settings.theme = {
    primaryColor: document.getElementById("theme-primary").value,
    backgroundColor: document.getElementById("theme-bg").value,
    cardColor: document.getElementById("theme-card").value,
    textColor: document.getElementById("theme-text").value
  };
  state.settings.payment = {
    methods: document.getElementById("payment-methods").value.split(",").map(s => s.trim()).filter(Boolean),
    note: document.getElementById("payment-note").value
  };

  const statusEl = document.getElementById("save-status");
  statusEl.textContent = "Saving...";
  try {
    const res = await fetch("/api/save-data", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: ADMIN_PASSWORD, data: state })
    });
    const json = await res.json();
    if (json.success) {
      statusEl.textContent = "✅ Saved! Site 30-60 sec mein update ho jayega.";
    } else {
      statusEl.textContent = "❌ Error: " + (json.error || "unknown");
    }
  } catch (e) {
    statusEl.textContent = "❌ Save failed, check console.";
    console.error(e);
  }
}
</script>
</body>
</html>
