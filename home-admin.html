<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zubay Engine - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b111e] text-white p-6">
  <h1 class="text-2xl font-black mb-6">DYNAMIC HOME ITEMS GRID</h1>
  <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

  <script>
    async function loadData() {
      // Yahan hum /api/home ko fetch kar rahe hain
      const res = await fetch('/api/home');
      const data = await res.json();
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      Object.keys(data.catalog).forEach(key => {
        const item = data.catalog[key];
        grid.innerHTML += `
          <div class="bg-[#0f172a] p-4 border border-gray-800 rounded-xl">
            <p class="font-bold">${item.name}</p>
            <img src="${item.image}" class="w-full h-24 object-cover my-2">
            <p class="text-cyan-400 text-xs">${item.redirect}</p>
          </div>
        `;
      });
    }
    loadData();
  </script>
</body>
</html>
