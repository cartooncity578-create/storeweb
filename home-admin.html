<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zubay Engine Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b111e] text-white p-10">

    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-[#0f172a] p-8 rounded-2xl border border-gray-800">
            <h1 class="text-2xl font-bold mb-6">Product Manager</h1>
            <div class="space-y-4">
                <input id="name-input" type="text" autocomplete="off" placeholder="Product Name" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                <input id="image-input" type="text" autocomplete="off" placeholder="Image URL" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                <input id="link-input" type="text" autocomplete="off" placeholder="Page Link" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                <select id="category-select" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                    <option value="topups">Topup</option>
                    <option value="subs">Subscriptions</option>
                </select>
                <button onclick="saveProduct()" class="w-full bg-green-600 hover:bg-green-500 p-3 rounded-lg font-bold transition">SAVE PRODUCT</button>
            </div>
        </div>

        <div class="bg-[#0f172a] p-8 rounded-2xl border border-gray-800">
            <h2 class="text-xl font-bold mb-4">Existing Products</h2>
            <div id="product-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const BIN_ID = "6a5511e3f5f4af5e29895352";
        const MASTER_KEY = "$2a$10$GgciNVlsxsg/OWI0DP9yau93Jy/igtLASCFRtt9ZYM80DPFZGYOtK";

        async function loadProducts() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
                const data = await res.json();
                const record = data.record;
                const container = document.getElementById('product-list');
                container.innerHTML = '';

                ['topups', 'subs'].forEach(cat => {
                    if (record[cat]) {
                        record[cat].forEach((p, i) => {
                            container.innerHTML += `
                                <div class="flex justify-between bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                                    <span><strong>${cat.toUpperCase()}:</strong> ${p.name}</span>
                                    <div class="space-x-4">
                                        <button onclick="editProduct('${cat}', ${i})" class="text-blue-400">Edit</button>
                                        <button onclick="deleteProduct('${cat}', ${i})" class="text-red-400">Delete</button>
                                    </div>
                                </div>`;
                        });
                    }
                });
            } catch (e) {
                document.getElementById('product-list').innerHTML = "Error loading products.";
            }
        }

        async function saveProduct() {
            const name = document.getElementById('name-input').value;
            const img = document.getElementById('image-input').value;
            const link = document.getElementById('link-input').value;
            const cat = document.getElementById('category-select').value;

            if(!name || !img || !link) return alert("All fields required!");

            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
            const data = await res.json();
            data.record[cat].push({ name, image: img, link: link });

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(data.record)
            });
            alert("Product Saved!");
            document.getElementById('name-input').value = '';
            document.getElementById('image-input').value = '';
            document.getElementById('link-input').value = '';
            loadProducts();
        }

        async function deleteProduct(cat, i) {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
            const data = await res.json();
            data.record[cat].splice(i, 1);
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(data.record)
            });
            loadProducts();
        }

        function editProduct(cat, i) {
            fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } })
            .then(res => res.json())
            .then(data => {
                const p = data.record[cat][i];
                document.getElementById('name-input').value = p.name;
                document.getElementById('image-input').value = p.image;
                document.getElementById('link-input').value = p.link;
                document.getElementById('category-select').value = cat;
                deleteProduct(cat, i);
            });
        }
        loadProducts();
    </script>
</body>
</html>
