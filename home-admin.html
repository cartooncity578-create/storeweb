<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zubay Engine Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b111e] text-white p-10">
    <div class="max-w-4xl mx-auto space-y-8">
        <div class="bg-[#0f172a] p-8 rounded-2xl border border-gray-800">
            <h1 class="text-2xl font-bold mb-6">Product Manager</h1>
            <div class="space-y-4">
                <input id="name-input" type="text" autocomplete="off" placeholder="Product Name" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                <input id="image-input" type="text" autocomplete="off" placeholder="Image URL" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                <input id="link-input" type="text" autocomplete="off" placeholder="Page Link" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                <select id="category-select" class="w-full bg-[#1e293b] p-3 rounded-lg border border-gray-700">
                    <option value="topups">Topup</option>
                    <option value="subs">Subscriptions</option>
                </select>
                <button onclick="saveProduct()" class="w-full bg-green-600 p-3 rounded-lg font-bold">SAVE PRODUCT</button>
            </div>
        </div>
        <div class="bg-[#0f172a] p-8 rounded-2xl border border-gray-800">
            <h2 class="text-xl font-bold mb-4">Existing Products</h2>
            <div id="product-list" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const BIN_ID = "6a5511e3f5f4af5e29895352";
        const MASTER_KEY = "$2a$10$GgciNVlsxsg/OWI0DP9yau93Jy/igtLASCFRtt9ZYM80DPFZGYOtK";

        async function getFullData() {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { headers: { "X-Master-Key": MASTER_KEY } });
            const json = await res.json();
            // Agar 'record' property hai to use lo, varna seedha json object
            return json.record ? json.record : json;
        }

        async function loadProducts() {
            const container = document.getElementById('product-list');
            try {
                const data = await getFullData();
                container.innerHTML = '';
                ['topups', 'subs'].forEach(cat => {
                    if (data[cat] && Array.isArray(data[cat])) {
                        data[cat].forEach((p, i) => {
                            container.innerHTML += `<div class="flex justify-between bg-[#1e293b] p-3 rounded-lg border border-gray-700"><span>${cat.toUpperCase()}: ${p.name}</span><button onclick="deleteProduct('${cat}', ${i})" class="text-red-400">Delete</button></div>`;
                        });
                    }
                });
            } catch (e) { container.innerHTML = "Error loading products."; }
        }

        async function saveProduct() {
            const name = document.getElementById('name-input').value;
            const img = document.getElementById('image-input').value;
            const link = document.getElementById('link-input').value;
            const cat = document.getElementById('category-select').value;
            
            const data = await getFullData();
            // Data ka structure ensure karo
            if(!data.topups) data.topups = [];
            if(!data.subs) data.subs = [];
            
            data[cat].push({ name, image: img, link: link });

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(data)
            });
            alert("Product Saved!");
            loadProducts();
        }

        async function deleteProduct(cat, i) {
            const data = await getFullData();
            data[cat].splice(i, 1);
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { "Content-Type": "application/json", "X-Master-Key": MASTER_KEY },
                body: JSON.stringify(data)
            });
            loadProducts();
        }
        loadProducts();
    </script>
</body>
</html>
