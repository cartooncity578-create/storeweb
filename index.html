<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubayGames - Premium Game Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#0b111e] text-white font-sans overflow-x-hidden" id="main-body">

  <!-- LOGIN MODAL -->
  <div id="login-modal" class="fixed inset-0 bg-[#0b111e]/95 backdrop-blur-xl z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-[#0f172a] border border-gray-800 w-full max-w-md p-8 rounded-2xl shadow-2xl space-y-6 text-center relative">
      <button onclick="closeModalAndAllowGuest()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-xl p-2 cursor-pointer">✕</button>
      <div class="space-y-2">
        <h2 class="text-3xl font-black text-cyan-400 tracking-wider uppercase">Zubay<span class="text-white">Games</span></h2>
        <p class="text-gray-400 text-xs">Official & Secure Google Authentication</p>
      </div>
      <div class="flex flex-col items-center justify-center py-6 bg-[#131b2e] border border-gray-800/60 rounded-xl p-4">
        <div id="g_id_onload" data-client_id="553436437827-hdp6q3siq48d3peq4090bssvjroqtbkr.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard" data-theme="dark" data-size="large"></div>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <button onclick="showStorefrontView()" class="text-2xl font-black text-cyan-400 uppercase">Zubay<span class="text-white">Games</span></button>
      <nav class="flex space-x-6 text-sm">
        <button onclick="showStorefrontView()">Home</button>
        <button onclick="smoothScrollTo('game-topup-section')">Games</button>
      </nav>
      <button onclick="openModal()" id="negative-signin-btn" class="bg-cyan-600 text-white font-bold text-xs px-4 py-2 rounded-xl uppercase">Sign In 🔑</button>
      <div id="user-profile-wrapper" class="hidden">
        <button onclick="toggleDropdown()" class="flex items-center space-x-2 bg-gray-800 p-1.5 rounded-full pr-3">
          <img id="user-img" src="" class="w-7 h-7 rounded-full">
          <span id="user-name" class="text-xs font-semibold">Gamer</span>
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-site" class="max-w-7xl mx-auto px-4 py-10 space-y-14">
    <section id="game-topup-section" class="scroll-mt-24">
      <h2 class="text-xl font-bold border-b border-gray-800 pb-2 mb-4">Game Top Up</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </section>
    <section id="subscription-section" class="scroll-mt-24">
      <h2 class="text-xl font-bold border-b border-gray-800 pb-2 mb-4">Subscriptions</h2>
      <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </section>
  </main>

  <script>
    const BIN_ID = "6a5511e3f5f4af5e29895352";
    const API_KEY = "$2a$10$egKxhR.4VvU.SAwShVHqJOYSzrT8NzDO2Kb5PaKiME8Q371dK3OPC";
    let isLoggedIn = false;

    async function fetchStoreData() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { "X-Access-Key": API_KEY }
        });
        const json = await res.json();
        const data = json.record || json; // Robust check
        
        const render = (container, items) => {
            document.querySelector(container).innerHTML = items.map(i => `
              <div onclick="handleGameClick('${i.link}')" class="bg-[#131b2e] rounded-xl border border-gray-800 hover:scale-[1.03] transition-all cursor-pointer">
                <div class="h-44 bg-cover bg-center rounded-t-xl" style="background-image: url('${i.image}')"></div>
                <div class="p-3 text-center text-xs font-bold">${i.name}</div>
              </div>`).join('');
        };
        
        if(data.topups) render('#game-topup-section .grid', data.topups);
        if(data.subs) render('#subscription-section .grid', data.subs);
      } catch (e) { console.error("Data fetch failed:", e); }
    }

    async function handleGameClick(link) {
      if (!isLoggedIn) return openModal();
      window.location.href = link;
    }

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      document.getElementById('user-name').innerText = payload.name;
      document.getElementById('user-img').src = payload.picture;
      isLoggedIn = true;
      document.getElementById('negative-signin-btn').classList.add('hidden');
      document.getElementById('user-profile-wrapper').classList.remove('hidden');
      closeModalAndAllowGuest();
    }

    function openModal() { document.getElementById('login-modal').classList.remove('hidden'); }
    function closeModalAndAllowGuest() { document.getElementById('login-modal').classList.add('hidden'); }
    function smoothScrollTo(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
    function showStorefrontView() { location.reload(); }

    document.addEventListener('DOMContentLoaded', () => {
        fetchStoreData();
        setTimeout(openModal, 1000); // Thoda delay se login modal
    });
  </script>
</body>
</html>
