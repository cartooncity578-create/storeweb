<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubayGames - Premium Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b111e] text-white">

  <!-- STOREFRONT SECTION (Default) -->
  <div id="store-view">
    <header class="p-6 border-b border-gray-800 flex justify-between items-center">
      <h1 class="text-2xl font-black text-cyan-400">ZUBAYGAMES</h1>
      <button onclick="showAdmin()" class="text-xs text-gray-500 hover:text-white">Admin</button>
    </header>
    <main class="p-10 text-center">
      <h2 class="text-3xl font-bold">Welcome to ZubayGames</h2>
      <p class="text-gray-400">Store is loading...</p>
    </main>
  </div>

  <!-- ADMIN SECTION (Hidden by default) -->
  <div id="admin-view" class="hidden p-10">
    <h2 class="text-2xl font-bold text-red-500">Product Manager</h2>
    <div class="mt-4 space-y-4">
      <input type="text" placeholder="Product Name" class="block w-full p-2 bg-gray-800 rounded">
      <button onclick="hideAdmin()" class="bg-gray-600 p-2 rounded">Back to Store</button>
    </div>
  </div>

  <script>
    function showAdmin() {
      document.getElementById('store-view').classList.add('hidden');
      document.getElementById('admin-view').classList.remove('hidden');
    }
    function hideAdmin() {
      document.getElementById('store-view').classList.remove('hidden');
      document.getElementById('admin-view').classList.add('hidden');
    }
  </script>
</body>
</html>
