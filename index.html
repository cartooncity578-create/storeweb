<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubayGames - Premium Game Store</title>
  <link class="rounded-full" rel="icon" type="image/png" href="zgs-logo.png">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#0b111e] text-white font-sans overflow-x-hidden">

  <!-- Login Modal -->
  <div id="login-modal" class="fixed inset-0 bg-[#0b111e]/95 backdrop-blur-xl z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-[#0f172a] border border-gray-800 w-full max-w-md p-8 rounded-2xl shadow-2xl space-y-6 text-center relative">
      <button onclick="closeModalAndAllowGuest()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-xl p-2 cursor-pointer">✕</button>
      <div class="space-y-2">
        <h2 class="text-3xl font-black text-cyan-400 tracking-wider uppercase">Zubay<span class="text-white">Games</span></h2>
        <p class="text-gray-400 text-xs">Official & Secure Google Authentication Required</p>
      </div>
      <div class="flex flex-col items-center justify-center py-6 bg-[#131b2e] border border-gray-800/60 rounded-xl p-4">
        <div id="g_id_onload" data-client_id="553436437827-hdp6q3siq48d3peq4090bssvjroqtbkr.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard" data-theme="dark" data-size="large" data-text="signin_with" data-shape="rectangular"></div>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header id="main-header" class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
      <button onclick="showStorefrontView()" class="text-2xl font-black tracking-wider text-cyan-400 uppercase cursor-pointer">Zubay<span class="text-white">Games</span></button>
      <nav class="flex space-x-6 text-gray-300 font-medium text-sm">
        <button onclick="showStorefrontView()" class="cursor-pointer">Home</button>
        <button onclick="smoothScrollTo('game-topup-section')" class="cursor-pointer">Games</button>
      </nav>
      <button onclick="openModal()" id="negative-signin-btn" class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold text-xs px-4 py-2 rounded-xl hover:scale-105 transition cursor-pointer uppercase">Sign In 🔑</button>
      <div id="user-profile-wrapper" class="relative hidden">
        <button onclick="toggleDropdown()" class="flex items-center space-x-2 bg-gray-800 p-1.5 rounded-full pr-3 hover:ring-2 hover:ring-cyan-500 transition cursor-pointer">
          <img id="user-img" src="https://api.dicebear.com/7.x/bottts/svg?seed=Zubay" alt="User" class="w-7 h-7 rounded-full bg-slate-700">
          <span id="user-name" class="text-xs font-semibold truncate">Gamer</span>
        </button>
      </div>
    </div>
  </header>

  <main id="main-site" class="max-w-7xl mx-auto px-4 py-6 space-y-14">
    <!-- Dynamic Grid Section -->
    <section id="game-topup-section" class="space-y-4">
      <div class="flex justify-between items-center border-b border-gray-800 pb-2">
        <h2 class="text-xl font-bold tracking-wide text-gray-100 flex items-center gap-2">
          <span class="w-1.5 h-6 bg-cyan-500 rounded-sm inline-block"></span> Game Top Up
        </h2>
      </div>
      <div id="main-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
        <!-- Yahan dynamic data load hoga -->
      </div>
    </section>
  </main>

  <script src="index.js"></script>
</body>
</html>
