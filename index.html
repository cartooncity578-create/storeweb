<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZubayGames - Premium Game Store</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#0b111e] text-white font-sans overflow-x-hidden" id="main-body">

  <div id="login-modal" class="fixed inset-0 bg-[#0b111e]/95 backdrop-blur-xl z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-[#0f172a] border border-gray-800 w-full max-w-md p-8 rounded-2xl shadow-2xl space-y-6 text-center relative">
      <button onclick="closeModalAndAllowGuest()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-xl p-2 transition cursor-pointer">✕</button>
      <div class="space-y-2">
        <h2 class="text-3xl font-black text-cyan-400 tracking-wider uppercase">Zubay<span class="text-white">Games</span></h2>
        <p class="text-gray-400 text-xs">Official & Secure Google Authentication Required</p>
      </div>
      <div class="flex flex-col items-center justify-center py-6 bg-[#131b2e] border border-gray-800/60 rounded-xl p-4">
        <div id="g_id_onload" data-client_id="553436437827-hdp6q3siq48d3peq4090bssvjroqtbkr.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
        <div class="g_id_signin" data-type="standard" data-theme="dark" data-size="large" data-text="signin_with" data-shape="rectangular"></div>
      </div>
    </div>
  </div>

  <header id="main-header" class="border-b border-gray-800 bg-[#0f172a] sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-wrap justify-between items-center gap-4">
      <button onclick="showStorefrontView()" class="text-2xl font-black tracking-wider text-cyan-400 uppercase bg-transparent border-none p-0 cursor-pointer text-left">Zubay<span class="text-white">Games</span></button>
      <nav class="flex space-x-6 text-gray-300 font-medium text-sm">
        <button onclick="showStorefrontView()" class="transition cursor-pointer bg-transparent border-none">Home</button>
        <button onclick="smoothScrollTo('game-topup-section')" class="transition cursor-pointer bg-transparent border-none">Games</button>
        <button onclick="showStandalonePage()" class="transition cursor-pointer bg-transparent border-none">Info</button>
      </nav>
      <div class="flex items-center space-x-4">
        <input type="text" placeholder="Search products..." class="bg-[#1e293b] text-sm px-4 py-2 rounded-lg border border-gray-700 w-40 sm:w-64">
        <button onclick="openModal()" id="negative-signin-btn" class="bg-gradient-to-r from-cyan-500 to-blue-500 text-white font-bold text-xs px-4 py-2 rounded-xl cursor-pointer uppercase">Sign In 🔑</button>
        <div id="user-profile-wrapper" class="relative hidden">
          <button onclick="toggleDropdown()" id="user-profile-btn" class="flex items-center space-x-2 bg-gray-800 p-1.5 rounded-full pr-3 cursor-pointer">
            <img id="user-img" src="" class="w-7 h-7 rounded-full">
            <span id="user-name" class="text-xs font-semibold">Gamer</span>
          </button>
          <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-[#0f172a] border border-gray-800 rounded-xl p-2 z-50">
            <button onclick="logout()" class="w-full text-left text-xs font-bold text-red-400 p-2 cursor-pointer">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div id="main-site">
    <main class="max-w-7xl mx-auto px-4 py-6 space-y-14">
      <section id="game-topup-section" class="space-y-4 scroll-mt-24">
        <h2 class="text-xl font-bold border-b border-gray-800 pb-2">Game Top Up</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
      </section>
      <section id="subscription-section" class="space-y-4 scroll-mt-24">
        <h2 class="text-xl font-bold border-b border-gray-800 pb-2">Subscriptions</h2>
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
      </section>
    </main>
  </div>

  <div id="standalone-page" class="hidden min-h-[50vh] flex flex-col justify-center items-center p-10 text-center">
    <h1 class="text-4xl font-black">Store Information</h1>
    <button onclick="showStorefrontView()" class="mt-6 bg-gray-800 px-6 py-2 rounded-lg cursor-pointer">← Back</button>
  </div>

  <script>
    const BIN_ID = "6a5511e3f5f4af5e29895352";
    const API_KEY = "$2a$10$egKxhR.4VvU.SAwShVHqJOYSzrT8NzDO2Kb5PaKiME8Q371dK3OPC";
    let isLoggedIn = false;

    async function fetchStoreData() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
            headers: { "X-Access-Key": API_KEY }
        });
        const data = await res.json();
        const gGrid = document.querySelector('#game-topup-section .grid');
        const sGrid = document.querySelector('#subscription-section .grid');
        gGrid.innerHTML = data.record.topups.map(g => `
          <div onclick="handleGameClick('${g.link}')" class="bg-[#131b2e] rounded-xl border border-gray-800 hover:scale-[1.03] transition-all cursor-pointer">
            <div class="h-44 bg-cover bg-center rounded-t-xl" style="background-image: url('${g.image}')"></div>
            <div class="p-3 text-center text-xs font-bold">${g.name}</div>
          </div>`).join('');
        sGrid.innerHTML = data.record.subs.map(s => `
          <div onclick="handleGameClick('${s.link}')" class="bg-[#131b2e] rounded-xl border border-gray-800 hover:scale-[1.03] transition-all cursor-pointer">
            <div class="h-44 bg-cover bg-center rounded-t-xl" style="background-image: url('${s.image}')"></div>
            <div class="p-3 text-center text-xs font-bold">${s.name}</div>
          </div>`).join('');
      } catch (e) { console.error("Error fetching data:", e); }
    }

    function handleCredentialResponse(response) {
      const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
      document.getElementById('user-name').innerText = payload.name;
      document.getElementById('user-img').src = payload.picture;
      isLoggedIn = true;
      document.getElementById('negative-signin-btn').classList.add('hidden');
      document.getElementById('user-profile-wrapper').classList.remove('hidden');
      closeModalAndAllowGuest();
    }

    function openModal() { document.getElementById('login-modal').classList.remove('hidden'); }
    function closeModalAndAllowGuest() { document.getElementById('login-modal').classList.add('hidden'); }
    function logout() { location.reload(); }
    function handleGameClick(link) { !isLoggedIn ? openModal() : window.location.href = link; }
    function toggleDropdown() { document.getElementById('profile-dropdown').classList.toggle('hidden'); }
    function smoothScrollTo(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
    function showStorefrontView() { document.getElementById('standalone-page').classList.add('hidden'); document.getElementById('main-site').classList.remove('hidden'); }
    function showStandalonePage() { document.getElementById('main-site').classList.add('hidden'); document.getElementById('standalone-page').classList.remove('hidden'); }

    document.addEventListener('DOMContentLoaded', () => {
        fetchStoreData();
        openModal();
    });
  </script>
</body>
</html>
