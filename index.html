<!-- index.html ka ye part replace karo -->
<section id="game-topup-section" class="space-y-4">
  <div class="flex justify-between items-center border-b border-gray-800 pb-2">
    <h2 class="text-xl font-bold tracking-wide text-gray-100 flex items-center gap-2">
      <span class="w-1.5 h-6 bg-cyan-500 rounded-sm inline-block"></span> Game Top Up
    </h2>
  </div>
  <!-- Dynamic Grid Container -->
  <div id="main-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
    <!-- Data yahan dynamic load hoga -->
  </div>
</section>

<script>
  async function loadProducts() {
    try {
      const res = await fetch('/api/home');
      const data = await res.json();
      const grid = document.getElementById('main-grid');
      grid.innerHTML = '';
      
      Object.keys(data.catalog).forEach(key => {
        const item = data.catalog[key];
        // Sirf Topup category dikhane ke liye
        if(item.cat === 'Topup') {
          grid.innerHTML += `
            <div onclick="handleGameClick('${item.redirect}')" class="bg-[#131b2e] rounded-xl overflow-hidden border border-gray-800 group cursor-pointer hover:scale-[1.03] transition-all">
              <div class="h-44 bg-[#1e293b] bg-cover bg-center" style="background-image: url('${item.image}');"></div>
              <div class="p-3 text-center"><h3 class="text-xs font-bold truncate text-gray-200 group-hover:text-cyan-400">${item.name}</h3></div>
            </div>
          `;
        }
      });
    } catch (e) { console.log("Loading error..."); }
  }
  loadProducts();
</script>
