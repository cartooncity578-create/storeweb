<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZubayGames Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .method-card { border: 2px solid #e5e7eb; cursor: pointer; transition: 0.3s; }
        .method-card.active { border-color: #0057d0; background: #f0f7ff; }
        #instruction-box { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex justify-center items-center">

    <!-- Main Container -->
    <div id="main-container" class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">ZubayGames</h2>

        <div class="bg-blue-600 text-white p-4 rounded-xl text-center mb-6 shadow-lg">
            <p class="text-sm opacity-80">Total Amount to Pay</p>
            <h1 class="text-3xl font-black">৳ <span id="display-amount">0.00</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="method-card p-4 rounded-xl text-center" onclick="showSteps(this, 'bKash', '01720960851')">
                <img src="https://pay.unigamebd.com/assets/gateways/bkash/bkashpersonal.png" class="h-8 mx-auto mb-2">
                <p class="text-xs font-bold">bKash</p>
            </div>
            <div class="method-card p-4 rounded-xl text-center" onclick="showSteps(this, 'Nagad', '01720960851')">
                <img src="https://pay.unigamebd.com/assets/gateways/nagad/nagadpersonal.png" class="h-8 mx-auto mb-2">
                <p class="text-xs font-bold">Nagad</p>
            </div>
        </div>

        <div id="instruction-box" class="bg-gray-50 p-5 rounded-xl border border-gray-200 text-sm space-y-3 text-gray-700">
            <p>• Go to your <b id="method-name"></b> App.</p>
            <p>• Choose: <b>Send Money</b></p>
            <div class="flex items-center justify-between bg-white p-2 rounded border">
                <span>Number: <b id="copy-number"></b></span>
                <button onclick="copyToClipboard()" class="text-blue-600 text-xs font-bold bg-blue-100 px-2 py-1 rounded">COPY</button>
            </div>
            <p>• Enter Amount: <b><span id="instruction-amount"></span> BDT</b></p>
            <input type="text" id="txid" placeholder="Enter Transaction ID" class="w-full p-2 border rounded mt-2">
            <button onclick="processPayment()" class="w-full bg-[#0057d0] text-white py-3 rounded-xl font-bold mt-2">VERIFY</button>
        </div>
    </div>

    <!-- Status Screen (Initially Hidden) -->
    <div id="status-screen" class="hidden text-center">
        <h1 id="status-text" class="text-2xl font-bold text-gray-800">Processing...</h1>
    </div>

    <script>
        const price = localStorage.getItem('checkout_pack_price') || '0.00';
        document.getElementById('display-amount').innerText = price;
        document.getElementById('instruction-amount').innerText = price;

        function showSteps(el, method, number) {
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('instruction-box').style.display = 'block';
            document.getElementById('method-name').innerText = method;
            document.getElementById('copy-number').innerText = number;
        }

        function copyToClipboard() {
            const num = document.getElementById('copy-number').innerText;
            navigator.clipboard.writeText(num);
            alert("Number copied: " + num);
        }

        function processPayment() {
            if(!document.getElementById('txid').value) return alert("Enter TxID!");
            
            // Step 1: Hide main container
            document.getElementById('main-container').style.display = 'none';
            // Step 2: Show status screen
            document.getElementById('status-screen').style.display = 'block';

            // Step 3: Wait 4 seconds then complete
            setTimeout(() => {
                document.getElementById('status-text').innerText = "Payment Complete!";
                document.getElementById('status-text').classList.add('text-green-600');
            }, 4000);
        }
    </script>
</body>
</html>
